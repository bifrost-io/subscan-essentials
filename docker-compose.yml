version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: subscan-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: subscan
      MYSQL_ROOT_PASSWORD: "helloload"
    # 每个连库的容器各用一份 MAX_DB_CONN_COUNT。例：api(1)+observer(1)+worker×10=12 → 12×80=960，须留余量
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=2000
    # 不映射到宿主机端口，避免暴露到外网
    # 数据目录默认在项目下 ./data/mysql（通常在 /data 盘）；盘满时在 .env 设 MYSQL_DATA_DIR 指到根盘路径，见 .env 示例
    volumes:
      - ${MYSQL_DATA_DIR:-./data/mysql}:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    container_name: subscan-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    # 不映射到宿主机端口，避免暴露到外网
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  subscan-api:
    build: .
    image: subscan/api
    container_name: subscan-api
    restart: unless-stopped
    environment: &app_env
      # 每容器进程上限；合计 ≈ (1 api + 1 observer + scale worker 数) × 本值 < mysql max_connections
      MAX_DB_CONN_COUNT: "80"
      # 同步并发 worker 数，过大易打满 RPC/DB，可逐步调高试
      WORKER_GOROUTINE_COUNT: "20"
      CHAIN_WS_ENDPOINT: "wss://eu.bifrost-kusama-rpc.liebi.com/ws"
      NETWORK_NODE: "bifrost-kusama"
      SUBSTRATE_ADDRESS_TYPE: "6"
      SUBSTRATE_ACCURACY: "12"
      DB_DRIVER: "mysql"
      MYSQL_HOST: "mysql"
      MYSQL_PORT: "3306"
      MYSQL_USER: "root"
      MYSQL_PASS: "helloload"
      MYSQL_DB: "subscan"
      # PostgreSQL（当前未启用，保留作切换参考）
      # POSTGRES_HOST: "postgres"
      # POSTGRES_PORT: "5432"
      # POSTGRES_USER: "gorm"
      # POSTGRES_PASS: "gorm"
      # POSTGRES_DB: "subscan"
      # POSTGRES_SSL_MODE: "disable"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      DEPLOY_ENV: "prod"
    ports:
      - "4399:4399"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_net

  subscan-observer:
    image: subscan/api
    container_name: subscan-observer
    restart: unless-stopped
    environment:
      <<: *app_env
    command: ["start", "subscribe"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_net

  subscan-worker:
    image: subscan/api
    restart: unless-stopped
    environment:
      <<: *app_env
    command: ["start", "worker"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_net


networks:
  app_net:
    driver: bridge
